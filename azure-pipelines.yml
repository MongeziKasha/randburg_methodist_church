trigger:
  branches:
    include:
      - '*'  # Runs pipeline on push to ANY branch

pr:
  branches:
    include:
      - main  # Runs pipeline when a PR is created for any branch targeting 'main'

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  solution: 'randburg_methodist_church.sln'

steps:
- task: Checkout@2
  displayName: 'Checkout code'

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '7.x'  # Use your .NET version

- task: DotNetCoreCLI@2
  inputs:
    command: 'restore'
    projects: '$(solution)'
  displayName: 'Restore dependencies'

- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    projects: '$(solution)'
    arguments: '--configuration $(buildConfiguration) --no-restore'
  displayName: 'Build the solution'

- task: DotNetCoreCLI@2
  inputs:
    command: 'test'
    projects: 'randburg_methodist_church_unitTests/randburg_methodist_church_unitTests.csproj'
    arguments: '--configuration $(buildConfiguration) --no-build'
  displayName: 'Run unit tests'

