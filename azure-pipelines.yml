trigger:
  branches:
    include:
      - '*'  # Runs pipeline on push to ANY branch

pr:
  branches:
    include:
      - Main  # Runs pipeline when a PR is created for ANY branch

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  solution: 'randburg_methodist_church.sln'

steps:
- Checkout code: self

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '7.x'  # Change this to your .NET version

- name: Restore dependencies
  run: dotnet restore $(solution)

- name: Build the solution
  run: dotnet build $(solution) --configuration $(buildConfiguration) --no-restore

- name: Run unit tests
  run: dotnet test randburg_methodist_church_unitTests/randburg_methodist_church_unitTests.csproj --configuration $(buildConfiguration) --no-build

