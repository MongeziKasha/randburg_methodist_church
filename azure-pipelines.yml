trigger:
  branches:
    include:
      - '*'  # Runs pipeline on push to ANY branch

pr:
  branches:
    include:
      - main  # Runs pipeline when a PR is created for any branch targeting 'main'

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Checkout@1
  displayName: 'Checkout code'

# Debugging step
- script: |
    echo "Solution: $(solution)"
    echo "Build Configuration: $(buildConfiguration)"
  displayName: 'Print variable values for debugging'
